name: WEHAGO New Quote

on:
  workflow_dispatch:
    inputs:
      call_text:
        description: "Inbound call text"
        required: true
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  issues: write

jobs:
  quote:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.issue.labels.*.name, 'wehago-new-quote') || contains(github.event.issue.title, 'WEHAGO') || contains(github.event.issue.title, '위하고')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build call text
        shell: bash
        env:
          CALL_TEXT: ${{ inputs.call_text }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          mkdir -p work outputs
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            printf '%s\n' "$CALL_TEXT" > work/call.txt
          else
            printf '%s\n\n%s\n' "$ISSUE_TITLE" "$ISSUE_BODY" > work/call.txt
          fi

      - name: Generate WEHAGO quote
        run: |
          python scripts/generate_wehago_quote.py --text-file work/call.txt --output outputs/wehago_quote.xlsx

      - name: Publish files to repository
        if: success() && github.event_name == 'issues'
        id: publish
        shell: bash
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          dest="generated/wehago-new-quote/issue-${ISSUE_NUMBER}/${RUN_ID}"
          mkdir -p "$dest"
          cp outputs/wehago_quote.xlsx "$dest"/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add -f "$dest"
          git commit -m "Add WEHAGO quote for issue #${ISSUE_NUMBER}" || true
          git push
          echo "xlsx_path=${dest}/wehago_quote.xlsx" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wehago-quote-${{ github.run_id }}
          path: outputs/wehago_quote.xlsx
          retention-days: 30

      - name: Comment result
        if: always() && github.event_name == 'issues'
        uses: actions/github-script@v7
        env:
          JOB_STATUS: ${{ job.status }}
          XLSX_PATH: ${{ steps.publish.outputs.xlsx_path }}
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const rawUrl = (path) => `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/raw/main/${path.split('/').map(encodeURIComponent).join('/')}`;
            const body = process.env.JOB_STATUS === 'success'
              ? `WEHAGO 신규견적 생성이 완료되었습니다.\n\n- [XLSX 다운로드](${rawUrl(process.env.XLSX_PATH)})\n\nActions 로그: ${runUrl}`
              : `WEHAGO 신규견적 생성에 실패했습니다. 통화 내용에 고객사명과 수량이 있는지 확인해주세요.\n\nActions 로그: ${runUrl}`;
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
