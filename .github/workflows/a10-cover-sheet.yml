name: A10 Cover Sheet

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: "A10 quote xlsx/pdf URL"
        required: true
      extension:
        description: "xlsx or pdf"
        required: true
        default: "xlsx"
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  issues: write

jobs:
  cover:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.issue.labels.*.name, 'a10-cover-sheet') || contains(github.event.issue.title, '갑지') || contains(github.event.issue.title, 'cover')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice libreoffice-calc fonts-noto-cjk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Prepare input
        shell: bash
        env:
          FILE_URL: ${{ inputs.file_url }}
          EXTENSION: ${{ inputs.extension || 'xlsx' }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          mkdir -p work outputs
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            curl -L "$FILE_URL" -o "work/input.${EXTENSION}"
          else
            printf '%s\n' "$ISSUE_BODY" > work/issue_body.md
            if grep -Eiq '\.pdf|user-attachments' work/issue_body.md; then
              python scripts/download_issue_attachment.py --body-file work/issue_body.md --extension pdf --output work/input.pdf || \
              python scripts/download_issue_attachment.py --body-file work/issue_body.md --extension xlsx --output work/input.xlsx
            else
              python scripts/download_issue_attachment.py --body-file work/issue_body.md --extension xlsx --output work/input.xlsx
            fi
          fi
          ls -l work

      - name: Generate cover sheet
        shell: bash
        run: |
          input="$(find work -maxdepth 1 -type f \( -name '*.xlsx' -o -name '*.pdf' \) | head -n 1)"
          python skills/a10-cover-sheet/scripts/generate_cover.py "$input" outputs/a10_cover

      - name: Publish files to repository
        if: success() && github.event_name == 'issues'
        id: publish
        shell: bash
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          dest="generated/a10-cover-sheet/issue-${ISSUE_NUMBER}/${RUN_ID}"
          mkdir -p "$dest"
          cp outputs/a10_cover.xlsx outputs/a10_cover.pdf "$dest"/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add -f "$dest"
          git commit -m "Add A10 cover sheet for issue #${ISSUE_NUMBER}" || true
          git push
          echo "xlsx_path=${dest}/a10_cover.xlsx" >> "$GITHUB_OUTPUT"
          echo "pdf_path=${dest}/a10_cover.pdf" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: a10-cover-sheet-${{ github.run_id }}
          path: |
            outputs/a10_cover.xlsx
            outputs/a10_cover.pdf
          retention-days: 30

      - name: Comment result
        if: always() && github.event_name == 'issues'
        uses: actions/github-script@v7
        env:
          JOB_STATUS: ${{ job.status }}
          PDF_PATH: ${{ steps.publish.outputs.pdf_path }}
          XLSX_PATH: ${{ steps.publish.outputs.xlsx_path }}
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const encodePath = (path) => path.split('/').map(encodeURIComponent).join('/');
            const rawUrl = (path) => `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/raw/main/${encodePath(path)}`;
            const body = process.env.JOB_STATUS === 'success'
              ? `A10 갑지 생성이 완료되었습니다.\n\n- [PDF 다운로드](${rawUrl(process.env.PDF_PATH)})\n- [XLSX 다운로드](${rawUrl(process.env.XLSX_PATH)})\n\nActions 로그: ${runUrl}`
              : `A10 갑지 생성에 실패했습니다. A10 견적서 xlsx/pdf 첨부 여부를 확인해주세요.\n\nActions 로그: ${runUrl}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
