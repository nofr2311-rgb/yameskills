name: DM Email List

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: "Excel URL"
        required: true
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  issues: write

jobs:
  dm:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.issue.labels.*.name, 'dm-emaillist') || contains(github.event.issue.title, 'DM') || contains(github.event.issue.title, '이메일')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Prepare input
        shell: bash
        env:
          FILE_URL: ${{ inputs.file_url }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          mkdir -p work/inputs outputs
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            curl -L "$FILE_URL" -o work/inputs/input.xlsx
          else
            printf '%s\n' "$ISSUE_BODY" > work/issue_body.md
            python scripts/download_issue_attachment.py --body-file work/issue_body.md --extension xlsx --output work/inputs --all
          fi

      - name: Extract emails
        run: |
          python scripts/extract_dm_emails.py --input-dir work/inputs --output outputs/dm_email_list.xlsx

      - name: Publish files to repository
        if: success() && github.event_name == 'issues'
        id: publish
        shell: bash
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          dest="generated/dm-emaillist/issue-${ISSUE_NUMBER}/${RUN_ID}"
          mkdir -p "$dest"
          cp outputs/dm_email_list.xlsx "$dest"/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add -f "$dest"
          git commit -m "Add DM email list for issue #${ISSUE_NUMBER}" || true
          git push
          echo "xlsx_path=${dest}/dm_email_list.xlsx" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dm-email-list-${{ github.run_id }}
          path: outputs/dm_email_list.xlsx
          retention-days: 30

      - name: Comment result
        if: always() && github.event_name == 'issues'
        uses: actions/github-script@v7
        env:
          JOB_STATUS: ${{ job.status }}
          XLSX_PATH: ${{ steps.publish.outputs.xlsx_path }}
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const rawUrl = (path) => `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/raw/main/${path.split('/').map(encodeURIComponent).join('/')}`;
            const body = process.env.JOB_STATUS === 'success'
              ? `DM 이메일 리스트 생성이 완료되었습니다.\n\n- [XLSX 다운로드](${rawUrl(process.env.XLSX_PATH)})\n\nActions 로그: ${runUrl}`
              : `DM 이메일 리스트 생성에 실패했습니다. xlsx 파일 첨부 여부를 확인해주세요.\n\nActions 로그: ${runUrl}`;
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
