name: Maintenance Report

on:
  workflow_dispatch:
    inputs:
      template_url:
        description: "Previous HWPX URL"
        required: true
      online_pdf_url:
        description: "Online support PDF URL"
        required: true
      phone_pdf_url:
        description: "Phone support PDF URL"
        required: true
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.issue.labels.*.name, 'maintenance-report') || contains(github.event.issue.title, '유지보수')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Prepare input
        shell: bash
        env:
          TEMPLATE_URL: ${{ inputs.template_url }}
          ONLINE_PDF_URL: ${{ inputs.online_pdf_url }}
          PHONE_PDF_URL: ${{ inputs.phone_pdf_url }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          mkdir -p work outputs
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            curl -L "$TEMPLATE_URL" -o work/template.hwpx
            curl -L "$ONLINE_PDF_URL" -o work/online.pdf
            curl -L "$PHONE_PDF_URL" -o work/phone.pdf
          else
            printf '%s\n' "$ISSUE_BODY" > work/issue_body.md
            python scripts/download_issue_attachment.py --body-file work/issue_body.md --extension hwpx --output work/template.hwpx
            python scripts/download_issue_attachment.py --body-file work/issue_body.md --extension pdf --output work/pdfs --all
            first_pdf="$(find work/pdfs -maxdepth 1 -type f -name '*.pdf' | sort | head -n 1)"
            second_pdf="$(find work/pdfs -maxdepth 1 -type f -name '*.pdf' | sort | tail -n 1)"
            cp "$first_pdf" work/online.pdf
            cp "$second_pdf" work/phone.pdf
          fi

      - name: Build data and generate HWPX
        run: |
          python scripts/build_maintenance_data.py --online-pdf work/online.pdf --phone-pdf work/phone.pdf --output work/data.json
          python skills/douzone-maintenance-report/scripts/generate_report.py --template work/template.hwpx --data work/data.json --output outputs/maintenance_report.hwpx

      - name: Publish files to repository
        if: success() && github.event_name == 'issues'
        id: publish
        shell: bash
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          dest="generated/maintenance-report/issue-${ISSUE_NUMBER}/${RUN_ID}"
          mkdir -p "$dest"
          cp outputs/maintenance_report.hwpx work/data.json "$dest"/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add -f "$dest"
          git commit -m "Add maintenance report for issue #${ISSUE_NUMBER}" || true
          git push
          echo "hwpx_path=${dest}/maintenance_report.hwpx" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: maintenance-report-${{ github.run_id }}
          path: |
            outputs/maintenance_report.hwpx
            work/data.json
          retention-days: 30

      - name: Comment result
        if: always() && github.event_name == 'issues'
        uses: actions/github-script@v7
        env:
          JOB_STATUS: ${{ job.status }}
          HWPX_PATH: ${{ steps.publish.outputs.hwpx_path }}
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const rawUrl = (path) => `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/raw/main/${path.split('/').map(encodeURIComponent).join('/')}`;
            const body = process.env.JOB_STATUS === 'success'
              ? `유지보수 보고서 생성이 완료되었습니다.\n\n- [HWPX 다운로드](${rawUrl(process.env.HWPX_PATH)})\n\nActions 로그: ${runUrl}`
              : `유지보수 보고서 생성에 실패했습니다. 이전 HWPX 1개와 온라인/유선 PDF 2개 첨부 여부를 확인해주세요.\n\nActions 로그: ${runUrl}`;
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
